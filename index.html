<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOOKBOOK — 72 Landing Page Sites</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ─── Tokens ─────────────────────────────────────────────────────── */
    :root {
      --bg:           #0a0a0a;
      --surface:      #111111;
      --surface-2:    #161616;
      --border:       #1e1e1e;
      --border-mid:   #2a2a2a;
      --muted:        #333333;
      --text:         #e8e8e8;
      --text-mid:     #888888;
      --text-dim:     #4a4a4a;
      --accent:       #e0ff4f;
      --accent-dim:   rgba(224, 255, 79, 0.10);
      --accent-glow:  rgba(224, 255, 79, 0.06);
      --font:         'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono:         'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      --ease:         cubic-bezier(0.16, 1, 0.3, 1);
      --t:            200ms;
    }

    /* ─── Base ───────────────────────────────────────────────────────── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Header ─────────────────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 10, 0.90);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1800px;
      margin: 0 auto;
      padding: 0 28px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border-mid);
      border-radius: 4px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
      padding: 5px;
    }

    .logo-icon-dot {
      background: var(--accent);
      border-radius: 1px;
    }

    .logo-icon-dot:nth-child(3) {
      background: var(--text-dim);
    }

    .logo-icon-dot:nth-child(4) {
      background: var(--text-dim);
    }

    .logo-text {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text);
      text-transform: uppercase;
    }

    .header-sep {
      width: 1px;
      height: 24px;
      background: var(--border);
    }

    .header-subtitle {
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .count-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-mid);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 99px;
      letter-spacing: 0.02em;
    }

    .count-badge svg {
      color: var(--accent);
    }

    .header-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: var(--text-dim);
      text-decoration: none;
      transition: color var(--t);
      letter-spacing: 0.02em;
    }

    .header-link:hover {
      color: var(--text);
    }

    /* ─── Filters Bar ────────────────────────────────────────────────── */
    .filters-bar {
      position: sticky;
      top: 62px;
      z-index: 99;
      background: rgba(10, 10, 10, 0.94);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .filters-inner {
      max-width: 1800px;
      margin: 0 auto;
      padding: 0 24px;
      height: 50px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 99px;
      cursor: pointer;
      transition: background var(--t), border-color var(--t), color var(--t);
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .filter-btn:hover {
      color: var(--text);
      border-color: var(--border-mid);
      background: var(--surface-2);
    }

    .filter-btn.active {
      color: var(--bg);
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 600;
    }

    .filter-btn .btn-count {
      font-size: 0.64rem;
      opacity: 0.65;
      font-family: var(--mono);
    }

    .filter-btn.active .btn-count {
      opacity: 0.75;
    }

    .filters-spacer {
      flex: 1;
    }

    .result-count {
      font-size: 0.68rem;
      color: var(--text-dim);
      font-family: var(--mono);
      letter-spacing: 0.04em;
    }

    /* ─── Main Wrapper ───────────────────────────────────────────────── */
    .main {
      max-width: 1800px;
      margin: 0 auto;
    }

    /* ─── Grid ───────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    /* ─── Section Divider ────────────────────────────────────────────── */
    .section-divider {
      grid-column: 1 / -1;
      background: var(--bg);
      padding: 44px 28px 22px;
      display: flex;
      align-items: flex-end;
      gap: 22px;
      border-top: 1px solid var(--border);
    }

    .section-divider:first-child {
      border-top: none;
      padding-top: 36px;
    }

    .section-num {
      font-family: var(--mono);
      font-size: 3rem;
      font-weight: 700;
      color: var(--border);
      line-height: 1;
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .section-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-bottom: 4px;
    }

    .section-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .section-desc {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ─── Card ───────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
      transition: background var(--t);
    }

    .card:hover {
      background: var(--surface-2);
    }

    /* ─── Card Image ─────────────────────────────────────────────────── */
    .card-img-wrapper {
      position: relative;
      height: 200px;
      overflow: hidden;
      background: #0c0c0c;
      flex-shrink: 0;
    }

    .card-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform var(--t) var(--ease);
    }

    .card:hover .card-img-wrapper img {
      transform: scale(1.04);
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        165deg,
        rgba(0, 0, 0, 0) 20%,
        rgba(0, 0, 0, 0.72) 100%
      );
      opacity: 0;
      transition: opacity var(--t) var(--ease);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 14px 16px;
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .overlay-title {
      color: #ffffff;
      font-size: 0.78rem;
      font-weight: 500;
      line-height: 1.35;
      flex: 1;
      margin-right: 10px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
    }

    .overlay-arrow {
      flex-shrink: 0;
      color: #ffffff;
      opacity: 0.85;
    }

    /* ─── Card Meta ──────────────────────────────────────────────────── */
    .card-meta {
      padding: 14px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
    }

    .card-num {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .card-product {
      font-size: 0.67rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 3px;
    }

    .tag {
      font-size: 0.6rem;
      padding: 2px 7px;
      border: 1px solid var(--muted);
      border-radius: 3px;
      color: var(--text-dim);
      letter-spacing: 0.03em;
      text-transform: lowercase;
    }

    /* ─── Prompt Toggle ──────────────────────────────────────────────── */
    .card-footer {
      padding: 8px 16px 14px;
    }

    .prompt-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 0.67rem;
      font-weight: 500;
      padding: 4px 9px;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 150ms, color 150ms, background 150ms;
      letter-spacing: 0.02em;
    }

    .prompt-toggle:hover {
      border-color: var(--border-mid);
      color: var(--text-mid);
      background: var(--surface-2);
    }

    .prompt-toggle .toggle-icon {
      flex-shrink: 0;
      transition: transform 200ms var(--ease);
    }

    .prompt-toggle.is-open .toggle-icon {
      transform: rotate(180deg);
    }

    .prompt-toggle.is-open {
      color: var(--text-mid);
      border-color: var(--border-mid);
    }

    .prompt-body {
      font-size: 0.7rem;
      color: var(--text-dim);
      line-height: 1.65;
      background: rgba(255, 255, 255, 0.018);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 11px 12px;
      margin-top: 7px;
    }

    /* ─── No Results ─────────────────────────────────────────────────── */
    .no-results {
      grid-column: 1 / -1;
      background: var(--bg);
      padding: 80px 28px;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.82rem;
    }

    /* ─── Footer ─────────────────────────────────────────────────────── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 28px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1800px;
      margin: 0 auto;
    }

    .footer-left {
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      font-family: var(--mono);
    }

    .footer-right {
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    /* ─── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .header-inner  { padding: 0 16px; }
      .header-subtitle { display: none; }
      .header-sep { display: none; }
      .filters-inner { padding: 0 12px; gap: 3px; }
      .filter-btn { padding: 4px 10px; font-size: 0.68rem; }
      .section-divider { padding: 28px 16px 16px; gap: 14px; }
      .section-num { font-size: 2rem; }
      .card-meta { padding: 12px 14px 6px; }
      .card-footer { padding: 6px 14px 12px; }
      .footer { flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ─── Header ──────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <div class="logo-mark">
          <div class="logo-icon" aria-hidden="true">
            <div class="logo-icon-dot"></div>
            <div class="logo-icon-dot"></div>
            <div class="logo-icon-dot"></div>
            <div class="logo-icon-dot"></div>
          </div>
          <span class="logo-text">Lookbook</span>
        </div>
        <div class="header-sep" aria-hidden="true"></div>
        <span class="header-subtitle">Design Gallery</span>
      </div>

      <div class="header-right">
        <span class="count-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
          72 Sites
        </span>
        <a href="sites/" class="header-link" target="_blank" rel="noopener">
          Browse Sites
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </a>
      </div>
    </div>
  </header>

  <!-- ─── Filters Bar ──────────────────────────────────────────────────── -->
  <div class="filters-bar" role="navigation" aria-label="Filter by category">
    <div class="filters-inner">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">
        All <span class="btn-count">72</span>
      </button>
      <button class="filter-btn" data-filter="design" onclick="setFilter('design', this)">
        Design Systems <span class="btn-count">47</span>
      </button>
      <button class="filter-btn" data-filter="pricing" onclick="setFilter('pricing', this)">
        Pricing <span class="btn-count">6</span>
      </button>
      <button class="filter-btn" data-filter="component" onclick="setFilter('component', this)">
        Components <span class="btn-count">19</span>
      </button>
      <div class="filters-spacer"></div>
      <span class="result-count" id="result-count">72 sites</span>
    </div>
  </div>

  <!-- ─── Grid ─────────────────────────────────────────────────────────── -->
  <main class="main">
    <div class="grid" id="grid" role="list" aria-label="Site gallery"></div>
  </main>

  <!-- ─── Footer ───────────────────────────────────────────────────────── -->
  <footer>
    <div class="footer">
      <span class="footer-left">LOOKBOOK / 72 LANDING PAGE SITES</span>
      <span class="footer-right">Click any card to open the site in a new tab</span>
    </div>
  </footer>

  <script>
    /* ─── Data ─────────────────────────────────────────────────────────── */
    const SITES = [
      { num:"001", folder:"01-high-contrast", title:"High Contrast Landing Page", product:"FORM.STUDIO", cat:"design", tags:["swiss","editorial","monochrome"], prompt:"A high-contrast Swiss-style minimalist design system utilizing brutalist typography and editorial layouts. Characterized by a neutral palette of off-whites, deep blacks, and monochromatic grays, this style emphasizes rhythmic patterns through stacked text 'echo' effects and asymmetrical grids. Ideal for luxury travel, architecture portfolios, high-end fashion, and premium editorial content where typography acts as the primary visual driver." },
      { num:"002", folder:"02-brutalist-ecommerce", title:"Brutalist E-commerce Page", product:"SOLSTICE", cat:"design", tags:["brutalist","ecommerce","fashion"], prompt:"A brutalist editorial e-commerce style guide inspired by poster-campaign aesthetics. Characterized by massive grotesque typography, soft-blurred gradient forms in red-orange tones (#DB4A2B, #F8A348), and a warm cream background (#E4E2DD). Optimized for high-end fashion brands that want a 'poster-first' digital presence. Features scroll-triggered entrance animations, mix-blend-mode interactions, and a clean, borderless grid structure." },
      { num:"003", folder:"03-brutalist-style-ecommerce", title:"Brutalist Style Ecommerce Page", product:"SEASON 04", cat:"design", tags:["brutalist","dark","neon"], prompt:"A brutalist editorial design system for high-fashion, streetwear, or luxury brands. Raw industrial aesthetic with massive typography. Key elements include a noise-grain texture overlay, a monochromatic palette with burnt orange and neon green accents (#31EF07), and asymmetrical layout grids. Uses 'Clash Grotesk' for aggressive impact." },
      { num:"004", folder:"04-saas-landing-developer-tool", title:"SaaS Landing for Developer Tool", product:"GRID.SH", cat:"design", tags:["saas","developer","modernist"], prompt:"A bold modernist design system inspired by exhibition poster aesthetics and technical documentation. High-contrast cream and cobalt (#1533CC) color palette, oversized aggressive typography, and a rigid 12-column grid layout with 1px border dividers. No rounded corners, vertical labeling system in a dedicated left-hand grid column." },
      { num:"005", folder:"05-superdesign-editorial-waitlist", title:"Editorial Waitlist", product:"ATELIER", cat:"design", tags:["editorial","waitlist","dark"], prompt:"Editorial waiting list landing page with a cinematic, high-fashion aesthetic. Deep matte #181818 background, warm beige #EBDCC4 typography, and a brutalist yet refined grid. Oversized edge-to-edge display type, subtle noise textures, and a layered text depth effect. Invite-only exclusivity aesthetic." },
      { num:"006", folder:"06-luxury-design-system", title:"Luxury Design System", product:"MAISON DUVAL", cat:"design", tags:["luxury","editorial","hospitality"], prompt:"A refined editorial-style design system with dusty rose and charcoal palette, staggered grid layouts. Glassmorphism navigation bar, grayscale-to-color image transitions, massive bold headlines paired with hyper-minimalist utility text. Optimized for high-end luxury services and boutique hospitality." },
      { num:"007", folder:"07-lumina-saas", title:"Lumina SaaS Landing Page", product:"LUMINA", cat:"design", tags:["neo-brutalist","creator","yellow"], prompt:"A high-energy Neo-Brutalist B2C SaaS design. Bold #ffe17c yellow primary, heavy 2px black borders, zero-blur hard shadows. Cabinet Grotesk for display typography. Bento-style grids, marquee animations, and playful asymmetric card shapes. Ideal for creator economy and fintech." },
      { num:"008", folder:"08-bold-editorial-style", title:"Bold Editorial Style", product:"PULSE DESIGN", cat:"design", tags:["editorial","bold","saas"], prompt:"A high-contrast editorial-style SaaS landing page. Anton display typography, golden yellow (#ffe17c) and deep charcoal (#171e19). Structured bento-box feature blocks with aggressive visual hierarchy. Grid pattern overlays. Suitable for high-velocity startups and design tools." },
      { num:"009", folder:"09-bold-editorial-design-style", title:"Bold Editorial Design Style", product:"VAULT STUDIO", cat:"design", tags:["editorial","agency","dark"], prompt:"A premium bold editorial design system. High-contrast brutalist typography, dark navy and sage color palette. Anton display headers, custom crosshair cursor, floating ambient gradients, asymmetric masonry layouts. Mix-blend-mode navigation and grayscale-to-color image transitions." },
      { num:"010", folder:"10-super-shampoo", title:"High-Conversion E-commerce", product:"OURA HAIR", cat:"design", tags:["ecommerce","d2c","beauty"], prompt:"Premium high-conversion e-commerce guide for D2C beauty brands. Clinical luxury aesthetic: sage green (#E2E8E4), off-white beige, deep charcoal. Scarcity-driven promo bars, trust badge grids, comparison tables, sticky mobile Add to Cart bar." },
      { num:"011", folder:"11-archive-form", title:"Archive & Form", product:"ARCHIV", cat:"design", tags:["editorial","furniture","minimal"], prompt:"An editorial museum-grade furniture catalog. Warm minimalist off-white and charcoal, Zodiak serif and General Sans pairing. Layout mimics high-end print magazines with asymmetric grids, thin architectural borders, generous negative space, and index-style navigation." },
      { num:"012", folder:"12-laboratory-skincare", title:"Laboratory Skincare", product:"LAB.01", cat:"design", tags:["clinical","beauty","data"], prompt:"A warm academic, methodical design system inspired by research journals and clinical lab notebooks. Grid-based disciplined layout, off-whites and warm grays. Tabular data presentation, formula sheets, Supplement Facts panels, and a 'Protocol' approach to content organization." },
      { num:"013", folder:"13-terroir-wine", title:"TERROIR Natural Wine Boutique", product:"TERROIR", cat:"design", tags:["dark","editorial","beverage"], prompt:"A high-end dark-mode editorial design system inspired by boutique natural wine tasting rooms. Charcoal, burgundy, and sage palette, anchored by Cormorant Garamond serif and Manrope. Generous whitespace, subtle grain textures, museum-like atmosphere." },
      { num:"014", folder:"14-aura-regimen-studio", title:"Aura Regimen Studio", product:"AURA", cat:"design", tags:["wellness","ecommerce","bento"], prompt:"A calm, deliberately designed wellness e-commerce landing page. Bento-grid regimen selector, detailed supplement protocol sections with Supplement Facts panels, visual usage timeline, and high-transparency quality modules. Shop-ready but pressure-free user experience." },
      { num:"015", folder:"15-aura-audio-showroom", title:"Product Showroom Flow", product:"AURA AUDIO", cat:"design", tags:["product","electronics","dark"], prompt:"A product-first electronics landing page built around a Showroom Flow layout — product theater followed by guided model selection, scenario-based feature explanations, lightweight comparison, and a confident close. Best suited for consumer electronics with multiple configurations." },
      { num:"016", folder:"16-header-hero-refinement", title:"Header & Hero Refinement", product:"CONCRETE MATTER", cat:"design", tags:["brutalist","streetwear","industrial"], prompt:"A brutalist streetwear design system. High-contrast neutral palette (concrete and ink), asymmetric layouts. Fixed mix-blend header, grainy texture overlay, 'broken' grid for product displays. Horizontal scrolling components, masonry-style social proof, grayscale-to-color hover effects." },
      { num:"017", folder:"17-mosaic-grid-architecture", title:"Mosaic Grid Architecture", product:"BLUEPRINT", cat:"design", tags:["b2b","technical","grid"], prompt:"An architectural technical-blueprint style design system. Forest green (#1A3C2B) and light-gray paper (#F7F7F5) palette. Space Grotesk and JetBrains Mono. Bento grid layouts and 2D flat wireframe aesthetics with zero shadows." },
      { num:"018", folder:"18-futuristic-saas", title:"Futuristic SaaS Landing Page", product:"AETHON", cat:"design", tags:["ai","glassmorphism","saas"], prompt:"A modern atmospheric SaaS design system. High-contrast blend of dark mode hero sections and light mode content areas. Glassmorphism, sophisticated serif-sans typography pairing, and ethereal glows. Emphasis on depth through backdrop blurs and subtle 1px borders." },
      { num:"019", folder:"19-aura-os-launch", title:"Launch Manifesto", product:"AURA OS", cat:"design", tags:["manifesto","editorial","dark"], prompt:"An editorial typography-heavy design system mimicking a high-end magazine or manifesto. High-contrast serif and grotesk font pairings, asymmetric layouts, and a sophisticated dark-mode palette with cream accents. For high-end product launches and literary-focused platforms." },

    /* ─── Helpers ──────────────────────────────────────────────────────── */
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const SVG_ARROW = `<svg class="overlay-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7,7 17,7 17,17"/></svg>`;

    const SVG_CHEVRON = `<svg class="toggle-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6,9 12,15 18,9"/></svg>`;

    /* ─── Card Renderer ────────────────────────────────────────────────── */
    function renderCard(site) {
      const tags = site.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('');
      return `
        <article class="card" role="listitem" onclick="openSite('${esc(site.folder)}')" aria-label="${esc(site.title)}">
          <div class="card-img-wrapper">
            <img
              src="thumbnails/${esc(site.folder)}.jpg"
              alt="${esc(site.title)} preview"
              loading="lazy"
              width="600"
              height="200"
            />
            <div class="card-overlay" aria-hidden="true">
              <span class="overlay-title">${esc(site.title)}</span>
              ${SVG_ARROW}
            </div>
          </div>
          <div class="card-meta">
            <span class="card-num">${esc(site.num)}</span>
            <h3 class="card-title">${esc(site.title)}</h3>
            <span class="card-product">${esc(site.product)}</span>
            <div class="card-tags">${tags}</div>
          </div>
          <div class="card-footer">
            <button
              class="prompt-toggle"
              onclick="event.stopPropagation(); togglePrompt(this)"
              aria-expanded="false"
            >
              ${SVG_CHEVRON}
              View Prompt
            </button>
            <div class="prompt-body" hidden>${esc(site.prompt)}</div>
          </div>
        </article>`;
    }

    /* ─── Section Divider ──────────────────────────────────────────────── */
    function renderDivider(label, desc, count) {
      return `
        <div class="section-divider" aria-hidden="true">
          <span class="section-num">${String(count).padStart(2, '0')}</span>
          <div class="section-info">
            <span class="section-label">Category</span>
            <h2 class="section-title">${label}</h2>
            <p class="section-desc">${desc}</p>
          </div>
        </div>`;
    }

    /* ─── Render ───────────────────────────────────────────────────────── */
    const SECTIONS = [
      {
        key:   'design',
        label: 'Design Systems',
        desc:  'Complete landing page design systems, style guides, and visual identities'
      },
      {
        key:   'pricing',
        label: 'Pricing',
        desc:  'Pricing sections, billing toggles, calculators, and comparison tables'
      },
      {
        key:   'component',
        label: 'Components & Interactions',
        desc:  'Standalone UI components, animations, and interaction patterns'
      }
    ];

    let activeFilter = 'all';

    function render(filter) {
      const grid = document.getElementById('grid');
      let html = '';
      let visibleCount = 0;

      if (filter === 'all') {
        for (const section of SECTIONS) {
          const items = SITES.filter(s => s.cat === section.key);
          if (!items.length) continue;
          html += renderDivider(section.label, section.desc, items.length);
          html += items.map(renderCard).join('');
          visibleCount += items.length;
        }
      } else {
        const items = SITES.filter(s => s.cat === filter);
        html += items.map(renderCard).join('');
        visibleCount = items.length;
      }

      if (!visibleCount) {
        html = `<div class="no-results">No sites in this category.</div>`;
      }

      grid.innerHTML = html;
      document.getElementById('result-count').textContent =
        visibleCount === 72 ? '72 sites' : `${visibleCount} sites`;
    }

    /* ─── Filter Handler ───────────────────────────────────────────────── */
    function setFilter(filter, btn) {
      if (activeFilter === filter) return;
      activeFilter = filter;

      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b === btn);
      });

      render(filter);
    }

    /* ─── Prompt Toggle ────────────────────────────────────────────────── */
    function togglePrompt(btn) {
      const body = btn.nextElementSibling;
      const isOpen = !body.hidden;

      body.hidden = isOpen;
      btn.classList.toggle('is-open', !isOpen);
      btn.setAttribute('aria-expanded', String(!isOpen));
    }

    /* ─── Open Site ────────────────────────────────────────────────────── */
    function openSite(folder) {
      window.open('sites/' + folder + '/index.html', '_blank', 'noopener');
    }

    /* ─── Init ─────────────────────────────────────────────────────────── */
    render('all');
  </script>
